name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  
jobs:
  ci:
    name: Pipeline de CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Testes
        run: npm test

        env:
          APP_ENV: ${{ vars.APP_ENV }}
          APP_VERSION: ${{ vars.APP_VERSION }}
          API_TOKEN: ${{ secrets.API_TOKEN }}

      - name: Gerar artefato
        run: npm run build

      - name: Publicar artefato
        uses: actions/upload-artifact@v4
        with:
          name: devops-pipeline-demo-${{ github.sha }}
          path: dist/
          retention-days: 7

      - name: Simular deploy (exemplo de uso de secrets)
        env:
          APP_ENV: ${{ vars.APP_ENV }}
          API_TOKEN: ${{ secrets.API_TOKEN }}
        run: |
          echo "Deploy para ambiente: $APP_ENV"
          echo "Token recebido (sera mascarado nos logs): $API_TOKEN"
          echo "Tamanho do token: ${#API_TOKEN} caracteres"
