name: CI

# Este workflow materializa o pipeline minimo discutido na aula:
# checkout -> dependencias -> lint -> testes -> artefato.
# Cada etapa e um "gate" que aumenta a confianca antes da proxima promocao.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  
jobs:
  ci:
    name: Pipeline de CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Testes
        run: npm test
        # `vars` sao configuracoes nao sensiveis (aparecem em texto puro no log).
        # `secrets` sao valores sensiveis (sao mascarados automaticamente no log).
        # Definir em: Settings > Secrets and variables > Actions.
        env:
          APP_ENV: ${{ vars.APP_ENV }}
          APP_VERSION: ${{ vars.APP_VERSION }}
          API_TOKEN: ${{ secrets.API_TOKEN }}

      - name: Gerar artefato
        run: npm run build

      - name: Publicar artefato
        uses: actions/upload-artifact@v4
        with:
          name: devops-pipeline-demo-${{ github.sha }}
          path: dist/
          retention-days: 7

      # Passo didatico: mostra como secrets/vars sao injetados em um "deploy".
      # Note no log do Actions: o valor de API_TOKEN aparece como `***`.
      - name: Simular deploy (exemplo de uso de secrets)
        env:
          APP_ENV: ${{ vars.APP_ENV }}
          API_TOKEN: ${{ secrets.API_TOKEN }}
        run: |
          echo "Deploy para ambiente: $APP_ENV"
          echo "Token recebido (sera mascarado nos logs): $API_TOKEN"
          echo "Tamanho do token: ${#API_TOKEN} caracteres"
